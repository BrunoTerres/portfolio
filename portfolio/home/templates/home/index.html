{% extends 'base.html' %}

{% block content %}

  {% load static %}

    <div id="wrapper3">
        <div id="portfolio" class="container">

            <div class="title">
                <h2>Web Dev Portfolio<h2>
                <span class="byline">Back-end focused Full Stack Web developer</span>
            </div>

            <div class="row ">
            
              {% for job in jobs %}

                <div class="col column">
                  <div class="box">
                    <a href="{{ job.get_absolute_url }}">
                      <img src="{% static 'images/'|add:job.name|add:'.png' %}"  width="160" height="160" alt="job logo" >
                    </a>
                    <h3>{{ job.name }}</h3>
                    <p>{{ job.description }}</p>
                    <a href="{{ job.get_absolute_url }}" class="button button-small">More</a>
                  </div>
                </div>
            
              {% endfor %}
            
            </div>
        </div>  
    </div>  
    
{% endblock %}
