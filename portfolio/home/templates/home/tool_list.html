{% extends "base_pages.html" %}

{% block content %}

    <h1>Tool List</h1>
        {% if tool_list %}
            <ul>
                {% for tool in tool_list %}
                    <li>
                        <a href="{{ tool.get_absolute_url }}">{{ tool.name }}</a><p><a href="{{ tool.language.get_absolute_url }}">{{ tool.language }}</a></p>
                    </li>   
                {% endfor %}
            </ul>
        {% else %}
            <p>There are no Tools in the Portfolio.</p>
        {% endif %}

{% endblock %}
